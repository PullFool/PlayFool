<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PlayFool</title>
  <style>
    body { margin: 0; background: #121212; }
    .loading {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      height: 100vh; color: #1DB954; font-family: 'Segoe UI', sans-serif;
      font-size: 24px; font-weight: 700;
    }
    .error { font-size: 12px; color: #999; word-break: break-all; max-width: 80%; text-align: center; }
  </style>
</head>
<body>
  <div class="loading" id="status">
    <img src="public/icon.png" alt="PlayFool" style="width:80px;height:80px;margin-bottom:12px;animation:spin 2s linear infinite;" />
    <style>@keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }</style>
    Loading PlayFool...
  </div>
  <script>
    var serverError = null;

    // Start server directly from NW.js node context
    try {
      require('./server');
    } catch(e) {
      serverError = e;
      document.getElementById('status').innerHTML =
        'Server error:<br><span class="error">' + e.message + '<br>' + e.stack + '</span>';
    }

    // Quit app on close
    try {
      var win = nw.Window.get();
      win.on('close', function() {
        win.close(true);
        nw.App.quit();
      });
    } catch(e) {
      // Not running in NW.js context, ignore
    }

    // Try multiple ports in case 3001 was in use
    var portsToTry = [3001, 3002, 3003, 3004, 3005];
    var portIndex = 0;
    var attempts = 0;
    var foundPort = null;

    function tryPort() {
      if (portIndex >= portsToTry.length) {
        document.getElementById('status').innerHTML =
          'Server did not respond on any port (3001-3005).' +
          '<br><span class="error">' +
          (serverError ? 'Error: ' + serverError.message : 'No error caught - server may have crashed silently.') +
          '<br>Try closing other PlayFool instances from Task Manager and restart.</span>';
        return;
      }

      var port = portsToTry[portIndex];
      attempts++;

      fetch('http://localhost:' + port + '/api/library')
        .then(function(res) {
          if (res.ok) {
            window.location.href = 'http://localhost:' + port;
          } else {
            retryOrNextPort();
          }
        })
        .catch(function() {
          retryOrNextPort();
        });
    }

    function retryOrNextPort() {
      if (attempts % 15 === 0) {
        // After 15 attempts on this port (~3 sec), try next port
        portIndex++;
        tryPort();
      } else {
        setTimeout(tryPort, 200);
      }
    }

    tryPort();
  </script>
</body>
</html>
