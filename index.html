<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PlayFool</title>
  <style>
    body { margin: 0; background: #121212; }
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; color: #1DB954; font-family: 'Segoe UI', sans-serif;
      font-size: 24px; font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="loading">Loading PlayFool...</div>
  <script>
    // Wait for the backend server to start, then load the React app from Express
    let attempts = 0;
    function waitForServer() {
      attempts++;
      fetch('http://localhost:3001/api/library')
        .then(res => {
          if (res.ok) {
            window.location.href = 'http://localhost:3001';
          } else {
            retry();
          }
        })
        .catch(() => {
          retry();
        });
    }
    function retry() {
      if (attempts > 50) {
        document.querySelector('.loading').innerHTML =
          'Server failed to start.<br><small style="font-size:14px;color:#999;">Check if port 3001 is in use or if node_modules/express exists.</small>';
        return;
      }
      setTimeout(waitForServer, 200);
    }
    waitForServer();
  </script>
</body>
</html>
