name: Build PlayFool

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npx react-scripts build
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:3001/api
          REACT_APP_SERVER_URL: http://localhost:3001

      - name: Download NW.js SDK
        run: |
          $nwVersion = "0.92.0"
          Invoke-WebRequest -Uri "https://dl.nwjs.io/v${nwVersion}/nwjs-v${nwVersion}-win-x64.zip" -OutFile nwjs.zip
          Expand-Archive -Path nwjs.zip -DestinationPath .
          Rename-Item "nwjs-v${nwVersion}-win-x64" "nwjs-dist"

      - name: Download ffmpeg
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-temp
          New-Item -ItemType Directory -Force -Path "ffmpeg"
          $ffDir = Get-ChildItem -Path ffmpeg-temp -Directory | Select-Object -First 1
          Copy-Item "$($ffDir.FullName)/bin/ffmpeg.exe" "ffmpeg/ffmpeg.exe"
          Copy-Item "$($ffDir.FullName)/bin/ffprobe.exe" "ffmpeg/ffprobe.exe"

      - name: Download yt-dlp
        run: |
          New-Item -ItemType Directory -Force -Path "bin"
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "bin/yt-dlp.exe"
          Write-Host "yt-dlp downloaded:"
          & "bin/yt-dlp.exe" --version

      - name: Package app
        run: |
          $dist = "PlayFool-Windows"

          Copy-Item -Recurse "nwjs-dist" $dist
          Copy-Item "server.js" "$dist/"
          Copy-Item "index.html" "$dist/"
          Copy-Item "main.js" "$dist/"
          Copy-Item -Recurse "build" "$dist/build"
          Copy-Item -Recurse "ffmpeg" "$dist/ffmpeg"
          Copy-Item -Recurse "bin" "$dist/bin"
          Copy-Item -Recurse "public" "$dist/public"

          '{"name":"playfool","version":"1.0.0","main":"index.html","node-main":"server.js","window":{"title":"PlayFool","width":1200,"height":800,"min_width":900,"min_height":600,"icon":"public/icon.png","toolbar":false,"frame":true},"dependencies":{"express":"^4.21.2","cors":"^2.8.5"}}' | Set-Content -Path "$dist/package.json" -Encoding ASCII -NoNewline

          Push-Location $dist
          npm install --omit=dev 2>&1
          Pop-Location

          # Verify server deps installed
          Write-Host "=== Checking node_modules ==="
          Write-Host "express exists: $(Test-Path "$dist/node_modules/express")"
          Write-Host "cors exists: $(Test-Path "$dist/node_modules/cors")"
          if (-not (Test-Path "$dist/node_modules/express")) {
            Write-Host "ERROR: express not installed, retrying..."
            Push-Location $dist
            npm install express cors --save 2>&1
            Pop-Location
          }
          Write-Host "node_modules contents:"
          Get-ChildItem "$dist/node_modules" -Directory | Select-Object -First 20 | ForEach-Object { Write-Host $_.Name }

          Rename-Item "$dist/nw.exe" "PlayFool.exe"

          @"
          @echo off
          cd /d "%~dp0"
          start "" "PlayFool.exe" --user-data-dir="%LOCALAPPDATA%\PlayFool\nw-data"
          "@ | Out-File -Encoding ascii "$dist/Launch PlayFool.bat"

          Compress-Archive -Path $dist -DestinationPath "PlayFool-Windows.zip"

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: PlayFool-Windows
          path: PlayFool-Windows.zip

  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npx react-scripts build
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:3001/api
          REACT_APP_SERVER_URL: http://localhost:3001

      - name: Download NW.js for macOS
        run: |
          NW_VERSION="0.92.0"
          curl -L "https://dl.nwjs.io/v${NW_VERSION}/nwjs-v${NW_VERSION}-osx-x64.zip" -o nwjs.zip
          unzip -q nwjs.zip
          mv "nwjs-v${NW_VERSION}-osx-x64" nwjs-dist

      - name: Download ffmpeg for macOS
        run: |
          mkdir -p ffmpeg
          # Try multiple sources for macOS ffmpeg
          curl -L "https://evermeet.cx/ffmpeg/getrelease/zip" -o ffmpeg-dl.zip && \
            unzip -q ffmpeg-dl.zip -d ffmpeg-temp && \
            cp ffmpeg-temp/ffmpeg ffmpeg/ffmpeg 2>/dev/null || \
          curl -L "https://github.com/eugeneware/ffmpeg-static/releases/latest/download/ffmpeg-darwin-x64.gz" -o ffmpeg.gz && \
            gunzip -c ffmpeg.gz > ffmpeg/ffmpeg || true
          if [ -f ffmpeg/ffmpeg ]; then
            chmod +x ffmpeg/ffmpeg
            echo "ffmpeg downloaded"
          else
            echo "Warning: ffmpeg not bundled, user will need to install it"
          fi

      - name: Download yt-dlp for macOS
        run: |
          mkdir -p bin
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" -o bin/yt-dlp
          chmod +x bin/yt-dlp
          bin/yt-dlp --version

      - name: Package macOS app
        run: |
          APP="PlayFool-macOS"
          mkdir -p "$APP"

          # Find the .app bundle
          echo "Contents of nwjs-dist:"
          ls -la nwjs-dist/
          NWAPP_SRC=$(find nwjs-dist -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$NWAPP_SRC" ]; then
            echo "Error: No .app found in nwjs-dist"
            exit 1
          fi
          echo "Found app: $NWAPP_SRC"

          cp -R "$NWAPP_SRC" "$APP/PlayFool.app"

          RESOURCES="$APP/PlayFool.app/Contents/Resources/app.nw"
          mkdir -p "$RESOURCES"
          cp server.js "$RESOURCES/"
          cp index.html "$RESOURCES/"
          cp main.js "$RESOURCES/"
          cp -R build "$RESOURCES/build"
          cp -R public "$RESOURCES/public"

          # Copy bundled binaries
          if [ -d ffmpeg ] && [ "$(ls -A ffmpeg 2>/dev/null)" ]; then
            cp -R ffmpeg "$RESOURCES/ffmpeg"
          fi
          if [ -d bin ] && [ "$(ls -A bin 2>/dev/null)" ]; then
            cp -R bin "$RESOURCES/bin"
          fi

          echo '{"name":"playfool","version":"1.0.0","main":"index.html","node-main":"server.js","window":{"title":"PlayFool","width":1200,"height":800,"min_width":900,"min_height":600,"icon":"public/icon.png","toolbar":false,"frame":true},"dependencies":{"express":"^4.21.2","cors":"^2.8.5"}}' > "$RESOURCES/package.json"

          cd "$RESOURCES"
          npm install --omit=dev
          cd -

          PLIST="$APP/PlayFool.app/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleName PlayFool" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName PlayFool" "$PLIST" 2>/dev/null || true
          fi

          xattr -cr "$APP/PlayFool.app"

          printf '#!/bin/bash\ncd "$(dirname "$0")"\necho "Setting up PlayFool..."\nxattr -cr "PlayFool.app"\nchmod -R +x "PlayFool.app"\necho "Done! Opening PlayFool..."\nopen "PlayFool.app"\n' > "$APP/Install PlayFool.command"
          chmod +x "$APP/Install PlayFool.command"

          cd "$APP"
          zip -r -q "../PlayFool-macOS.zip" "PlayFool.app" "Install PlayFool.command"
          cd ..

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: PlayFool-macOS
          path: PlayFool-macOS.zip

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: PlayFool-Windows

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: PlayFool-macOS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PlayFool-Windows.zip
            PlayFool-macOS.zip
          name: PlayFool ${{ github.ref_name }}
          body: |
            ## PlayFool - Desktop Music & Video Player

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows 10/11 (64-bit) | `PlayFool-Windows.zip` |
            | macOS (Intel) | `PlayFool-macOS.zip` |

            ### Install
            **Windows:** Extract zip → Run `PlayFool.exe`
            **macOS:** Open Terminal and run:
            ```
            cd ~/Downloads && unzip -o PlayFool-macOS.zip -d PlayFool && xattr -cr PlayFool/PlayFool.app && open PlayFool/PlayFool.app
            ```

            **No additional software required!** yt-dlp and ffmpeg are bundled.

            ### Features
            - YouTube search, preview (video + audio), and download
            - MP3 and MP4 downloads with quality selection
            - Scan PC for existing music and videos
            - Music library with playlists
            - Synced lyrics (offline)
            - Video player with side panel
            - Shuffle, repeat, seek controls

            Made by PullFool
