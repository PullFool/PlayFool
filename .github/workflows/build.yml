name: Build PlayFool

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npx react-scripts build
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:3001/api
          REACT_APP_SERVER_URL: http://localhost:3001

      - name: Download NW.js
        run: |
          $nwVersion = "0.92.0"
          Invoke-WebRequest -Uri "https://dl.nwjs.io/v${nwVersion}/nwjs-v${nwVersion}-win-x64.zip" -OutFile nwjs.zip
          Expand-Archive -Path nwjs.zip -DestinationPath .
          Rename-Item "nwjs-v${nwVersion}-win-x64" "nwjs-dist"

      - name: Replace NW.js ffmpeg with proprietary codecs version
        run: |
          Invoke-WebRequest -Uri "https://github.com/nwjs-ffmpeg-prebuilt/nwjs-ffmpeg-prebuilt/releases/download/0.92.0/0.92.0-win-x64.zip" -OutFile nw-ffmpeg.zip
          Expand-Archive -Path nw-ffmpeg.zip -DestinationPath nw-ffmpeg-temp -Force
          Copy-Item "nw-ffmpeg-temp/ffmpeg.dll" "nwjs-dist/ffmpeg.dll" -Force
          Write-Host "Replaced ffmpeg.dll with proprietary codecs version ($(Get-Item 'nwjs-dist/ffmpeg.dll').Length) bytes"

      - name: Download ffmpeg
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-temp
          New-Item -ItemType Directory -Force -Path "ffmpeg"
          $ffDir = Get-ChildItem -Path ffmpeg-temp -Directory | Select-Object -First 1
          Copy-Item "$($ffDir.FullName)/bin/ffmpeg.exe" "ffmpeg/ffmpeg.exe"
          Copy-Item "$($ffDir.FullName)/bin/ffprobe.exe" "ffmpeg/ffprobe.exe"

      - name: Download yt-dlp
        run: |
          New-Item -ItemType Directory -Force -Path "bin"
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "bin/yt-dlp.exe"
          & "bin/yt-dlp.exe" --version

      - name: Package app
        run: |
          $dist = "dist"
          Copy-Item -Recurse "nwjs-dist" $dist

          # Copy app files
          Copy-Item "server.js" "$dist/"
          Copy-Item "index.html" "$dist/"
          Copy-Item "main.js" "$dist/"
          Copy-Item -Recurse "build" "$dist/build"
          Copy-Item -Recurse "ffmpeg" "$dist/ffmpeg"
          Copy-Item -Recurse "bin" "$dist/bin"
          Copy-Item -Recurse "public" "$dist/public"

          # Package.json for NW.js
          '{"name":"playfool","version":"1.0.0","main":"index.html","node-main":"server.js","window":{"title":"PlayFool","width":1200,"height":800,"min_width":900,"min_height":600,"icon":"public/icon.png","toolbar":false,"frame":true},"dependencies":{"express":"^4.21.2","cors":"^2.8.5"}}' | Set-Content -Path "$dist/package.json" -Encoding ASCII -NoNewline

          # Copy only production dependencies
          New-Item -ItemType Directory -Force -Path "$dist/node_modules"

          # Install production deps only in dist
          Push-Location $dist
          npm install --omit=dev --no-audit --no-fund 2>&1
          Pop-Location

          # Verify
          Write-Host "=== Verify deps ==="
          Write-Host "express: $(Test-Path "$dist/node_modules/express")"
          Write-Host "cors: $(Test-Path "$dist/node_modules/cors")"

          # Convert PNG to ICO using magick (available on windows-latest)
          magick "public/icon.png" -define icon:auto-resize=256,128,64,48,32,16 "public/icon.ico"
          Copy-Item "public/icon.ico" "$dist/public/icon.ico"

          # Rename nw.exe to PlayFool.exe
          Rename-Item "$dist/nw.exe" "PlayFool.exe"

          # Replace the exe icon with our custom icon using rcedit
          npm install --no-save rcedit 2>&1
          node -e "require('rcedit')('dist/PlayFool.exe', { icon: 'public/icon.ico' }).then(() => console.log('Icon embedded')).catch(e => console.error('Icon embed failed:', e))"

      - name: Build installer with Inno Setup
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if ([string]::IsNullOrEmpty($version)) { $version = "1.0.0" }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="$version" "installer.iss"

      - name: Also create portable zip
        run: |
          Compress-Archive -Path "dist\*" -DestinationPath "PlayFool-Windows-Portable.zip"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: PlayFool-Windows-Setup
          path: PlayFool-Setup.exe

      - name: Upload Windows portable
        uses: actions/upload-artifact@v4
        with:
          name: PlayFool-Windows-Portable
          path: PlayFool-Windows-Portable.zip

  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npx react-scripts build
        env:
          CI: false
          REACT_APP_API_URL: http://localhost:3001/api
          REACT_APP_SERVER_URL: http://localhost:3001

      - name: Download NW.js for macOS
        run: |
          NW_VERSION="0.92.0"
          curl -L "https://dl.nwjs.io/v${NW_VERSION}/nwjs-v${NW_VERSION}-osx-x64.zip" -o nwjs.zip
          unzip -q nwjs.zip
          mv "nwjs-v${NW_VERSION}-osx-x64" nwjs-dist

      - name: Replace NW.js ffmpeg with proprietary codecs (macOS)
        run: |
          curl -L -o nw-ffmpeg.zip "https://github.com/nwjs-ffmpeg-prebuilt/nwjs-ffmpeg-prebuilt/releases/download/0.92.0/0.92.0-osx-x64.zip"
          unzip -o nw-ffmpeg.zip -d nw-ffmpeg-temp
          NWAPP=$(find nwjs-dist -name "nwjs.app" -type d | head -1)
          if [ -n "$NWAPP" ]; then
            FRAMEWORK_DIR="$NWAPP/Contents/Frameworks/nwjs Framework.framework/Versions/Current"
            cp nw-ffmpeg-temp/libffmpeg.dylib "$FRAMEWORK_DIR/libffmpeg.dylib" 2>/dev/null || true
            echo "Replaced libffmpeg.dylib with proprietary codecs"
          fi

      - name: Download ffmpeg for macOS
        run: |
          mkdir -p ffmpeg
          curl -L "https://evermeet.cx/ffmpeg/getrelease/zip" -o ffmpeg-dl.zip && \
            unzip -q ffmpeg-dl.zip -d ffmpeg-temp && \
            cp ffmpeg-temp/ffmpeg ffmpeg/ffmpeg 2>/dev/null || true
          if [ -f ffmpeg/ffmpeg ]; then
            chmod +x ffmpeg/ffmpeg
            echo "ffmpeg downloaded"
          else
            echo "Warning: ffmpeg not bundled"
          fi

      - name: Download yt-dlp for macOS
        run: |
          mkdir -p bin
          curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" -o bin/yt-dlp
          chmod +x bin/yt-dlp
          bin/yt-dlp --version

      - name: Package macOS app
        run: |
          APP="PlayFool-macOS"
          mkdir -p "$APP"

          NWAPP_SRC=$(find nwjs-dist -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$NWAPP_SRC" ]; then
            echo "Error: No .app found in nwjs-dist"
            exit 1
          fi

          cp -R "$NWAPP_SRC" "$APP/PlayFool.app"

          RESOURCES="$APP/PlayFool.app/Contents/Resources/app.nw"
          mkdir -p "$RESOURCES"
          cp server.js "$RESOURCES/"
          cp index.html "$RESOURCES/"
          cp main.js "$RESOURCES/"
          cp -R build "$RESOURCES/build"
          cp -R public "$RESOURCES/public"

          if [ -d ffmpeg ] && [ "$(ls -A ffmpeg 2>/dev/null)" ]; then
            cp -R ffmpeg "$RESOURCES/ffmpeg"
          fi
          if [ -d bin ] && [ "$(ls -A bin 2>/dev/null)" ]; then
            cp -R bin "$RESOURCES/bin"
          fi

          echo '{"name":"playfool","version":"1.0.0","main":"index.html","node-main":"server.js","window":{"title":"PlayFool","width":1200,"height":800,"min_width":900,"min_height":600,"icon":"public/icon.png","toolbar":false,"frame":true},"dependencies":{"express":"^4.21.2","cors":"^2.8.5"}}' > "$RESOURCES/package.json"

          # Install production deps only
          cd "$RESOURCES"
          npm install --omit=dev --no-audit --no-fund 2>&1
          cd -

          echo "=== Verify deps ==="
          echo "express: $(test -d "$RESOURCES/node_modules/express" && echo YES || echo NO)"
          echo "cors: $(test -d "$RESOURCES/node_modules/cors" && echo YES || echo NO)"

          # Update app name in plist
          PLIST="$APP/PlayFool.app/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleName PlayFool" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName PlayFool" "$PLIST" 2>/dev/null || true
          fi

          # Remove quarantine
          xattr -cr "$APP/PlayFool.app" 2>/dev/null || true

          # Create install helper script
          printf '#!/bin/bash\ncd "$(dirname "$0")"\necho "Setting up PlayFool..."\nxattr -cr "PlayFool.app"\nchmod -R +x "PlayFool.app"\necho "Done! Opening PlayFool..."\nopen "PlayFool.app"\n' > "$APP/Install PlayFool.command"
          chmod +x "$APP/Install PlayFool.command"

          cd "$APP"
          zip -r -q "../PlayFool-macOS.zip" "PlayFool.app" "Install PlayFool.command"
          cd ..

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: PlayFool-macOS
          path: PlayFool-macOS.zip

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: PlayFool-Windows-Setup

      - name: Download Windows portable
        uses: actions/download-artifact@v4
        with:
          name: PlayFool-Windows-Portable

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: PlayFool-macOS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PlayFool-Setup.exe
            PlayFool-Windows-Portable.zip
            PlayFool-macOS.zip
          name: PlayFool ${{ github.ref_name }}
          body: |
            ## PlayFool - Desktop Music & Video Player

            ### Downloads
            | Platform | File | Description |
            |----------|------|-------------|
            | Windows (Installer) | `PlayFool-Setup.exe` | Recommended - installs with Start Menu & Desktop shortcut |
            | Windows (Portable) | `PlayFool-Windows-Portable.zip` | No install needed - extract and run |
            | macOS (Intel) | `PlayFool-macOS.zip` | See install instructions below |

            ### Install
            **Windows:** Download and run `PlayFool-Setup.exe` → Follow the setup wizard.
            **macOS:** Open Terminal and run:
            ```
            cd ~/Downloads && unzip -o PlayFool-macOS.zip -d PlayFool && xattr -cr PlayFool/PlayFool.app && open PlayFool/PlayFool.app
            ```

            **No additional software required!** yt-dlp and ffmpeg are bundled.

            ### Features
            - YouTube search, preview (video + audio), and download
            - MP3 and MP4 downloads with quality selection
            - Scan PC for existing music and videos
            - Music library with playlists
            - Synced lyrics (offline)
            - Video player with side panel
            - Shuffle, repeat, seek controls

            Made by PullFool
